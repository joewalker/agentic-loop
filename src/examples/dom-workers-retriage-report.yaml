  REASON: The evidence points to this report being subsumed rather than still open: in [bug 1156830](https://bugzilla.mozilla.org/show_bug.cgi?id=1156830), comment 3 identifies the real Gecko issue as stale `ServiceWorkerClient` objects surviving reloads and spins that into [bug 1158728](https://bugzilla.mozilla.org/show_bug.cgi?id=1158728), which was resolved FIXED for Firefox 41 on May 23, 2015. Since then this area has also been substantially refactored from the old `dom/workers/ServiceWorkerClient` code into the generic Clients stack, where clients have stable ids ([ClientInfo.h#L62](/Users/jwalker/Projects/firefox/dom/clients/manager/ClientInfo.h#L62)), destroyed clients reject `postMessage()` ([ClientHandle.cpp#L142](/Users/jwalker/Projects/firefox/dom/clients/manager/ClientHandle.cpp#L142)), controlled clients are dropped on detach/navigation ([ServiceWorkerManager.cpp#L645](/Users/jwalker/Projects/firefox/dom/serviceworkers/ServiceWorkerManager.cpp#L645)), and incoming messages are queued until message delivery is started when `onmessage` is installed ([ServiceWorkerContainer.h#L37](/Users/jwalker/Projects/firefox/dom/serviceworkers/ServiceWorkerContainer.h#L37), [ServiceWorkerContainer.cpp#L141](/Users/jwalker/Projects/firefox/dom/serviceworkers/ServiceWorkerContainer.cpp#L141), [ServiceWorkerContainer.cpp#L442](/Users/jwalker/Projects/firefox/dom/serviceworkers/ServiceWorkerContainer.cpp#L442)). I did not rerun the original STR against a modern build here, so confidence is not high, but this no longer looks like a separately actionable current bug.
